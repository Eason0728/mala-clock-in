<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>麻的小辛辣 值班主管核定</title>
<link rel="apple-touch-icon" href="assets/icon-180-manager.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<meta name="apple-mobile-web-app-title" content="值班核定">
<style>
  :root {
    --brand-red: #E8380D;
    --brand-pink: #EF856D;
    --brand-black: #231815;
    --brand-orange: #F08300;
    --brand-gold: #FABE00;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: radial-gradient(120% 90% at 50% 16%, #c9290b 0%, #a81f08 55%, #8a1906 100%) fixed;
    color: #fff;
    min-height: 100vh;
  }
  .container {
    max-width: 520px;
    margin: 0 auto;
    min-height: 100vh;
    padding: 24px 16px 40px;
  }
  header {
    text-align: center;
    margin-bottom: 20px;
  }
  header h1 {
    font-size: 22px;
    font-weight: 900;
    margin: 0 0 4px;
    letter-spacing: 1px;
  }
  header p {
    margin: 0;
    opacity: 0.85;
    font-size: 13px;
  }
  .date-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 18px;
  }
  .date-bar button {
    flex: 0 0 auto;
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 16px;
    font-weight: 700;
    -webkit-tap-highlight-color: transparent;
  }
  .date-bar input[type=date] {
    flex: 1 1 auto;
    padding: 10px 8px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    color: var(--brand-black);
    text-align: center;
  }
  .card {
    background: #fff;
    color: var(--brand-black);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 16px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
  }
  .center-msg { text-align: center; padding: 40px 0; }
  .emp-name {
    font-size: 19px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .punch-summary {
    font-size: 13px;
    color: #6b524a;
    margin-bottom: 4px;
    line-height: 1.5;
  }
  .approved-badge {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  .approved-badge.normal { background: #e6f7ec; color: #1a7a3d; }
  .approved-badge.warn { background: #fff6e0; color: #8a6100; }
  .approved-badge.pending { background: #f0e6e2; color: #8a6a5f; }
  .period-rows {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 10px;
  }
  .period-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .period-row input[type=time] {
    flex: 1 1 0;
    min-width: 0;
    padding: 8px 6px;
    border-radius: 8px;
    border: 1px solid #f0e6e2;
    font-size: 15px;
    color: var(--brand-black);
  }
  .period-row .dash { color: #8a6a5f; }
  .period-row .remove-btn {
    flex: 0 0 auto;
    background: none;
    border: 1px solid #f0e6e2;
    color: #c22a12;
    border-radius: 8px;
    width: 34px;
    height: 34px;
    font-size: 16px;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .leave-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .leave-row label {
    flex: 0 0 auto;
    font-size: 14px;
    color: #8a6a5f;
  }
  .leave-row select {
    flex: 1 1 0;
    min-width: 0;
    padding: 8px 6px;
    border-radius: 8px;
    border: 1px solid #f0e6e2;
    font-size: 15px;
    color: var(--brand-black);
    background: #fff;
  }
  .leave-row input.leave-hours {
    flex: 0 0 88px;
    width: 88px;
    min-width: 0;
    padding: 8px 6px;
    border-radius: 8px;
    border: 1px solid #f0e6e2;
    font-size: 15px;
    color: var(--brand-black);
  }
  .leave-row input.leave-hours:disabled {
    background: #f4efec;
    color: #b7a9a2;
  }
  .leave-row .hours-unit { flex: 0 0 auto; font-size: 14px; color: #8a6a5f; }
  .card-actions {
    display: flex;
    gap: 10px;
  }
  .add-period-btn {
    flex: 1 1 auto;
    background: none;
    border: 1px dashed #d9b8ae;
    color: #8a6a5f;
    border-radius: 10px;
    padding: 10px;
    font-size: 14px;
    -webkit-tap-highlight-color: transparent;
  }
  .submit-btn {
    flex: 1 1 auto;
    background: var(--brand-orange);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px;
    font-size: 15px;
    font-weight: 700;
    -webkit-tap-highlight-color: transparent;
  }
  .submit-btn:disabled { opacity: 0.5; }
  .result-box {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }
  .result-box.show { display: block; }
  .result-ok { background: #e6f7ec; color: #1a7a3d; }
  .result-warn { background: #fff6e0; color: #8a6100; }
  .result-error { background: #fdeceb; color: #c22a12; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>麻的🔥小辛辣</h1>
    <p>值班主管核定</p>
  </header>

  <div class="date-bar">
    <button type="button" id="btnPrevDay">‹</button>
    <input type="date" id="dateInput">
    <button type="button" id="btnNextDay">›</button>
    <button type="button" id="btnToday">今天</button>
  </div>

  <div id="loadingCard" class="card center-msg">載入中…</div>
  <div id="errorCard" class="card center-msg" style="display:none; color:#c22a12;"></div>
  <div id="empList"></div>
</div>

<script>
(function () {
  'use strict';

  var API_URL = 'https://script.google.com/macros/s/AKfycbxE4DTz847y0bPvLd4mD_9vBFTe3npmVVYKU1CYgeFcUpAuL4vLIA3rySXSR-2qujdJ0A/exec';

  function qs(name) {
    var params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  var isLocalHost = ['localhost', '127.0.0.1'].indexOf(window.location.hostname) !== -1;
  if (isLocalHost) {
    var apiOverride = qs('api');
    if (apiOverride) API_URL = apiOverride;
  }

  var mgrKey = qs('k');

  var loadingCard = document.getElementById('loadingCard');
  var errorCard = document.getElementById('errorCard');
  var empListEl = document.getElementById('empList');
  var dateInput = document.getElementById('dateInput');
  var btnPrevDay = document.getElementById('btnPrevDay');
  var btnNextDay = document.getElementById('btnNextDay');
  var btnToday = document.getElementById('btnToday');

  var currentDate = null; // 'yyyy-mm-dd'，由伺服器回傳值決定（避免依賴裝置時區）

  function apiPost(payload) {
    return fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    }).then(function (res) { return res.json(); });
  }

  function showError(msg) {
    loadingCard.style.display = 'none';
    empListEl.innerHTML = '';
    errorCard.style.display = 'block';
    errorCard.textContent = msg;
  }

  function addDaysStr(dateStr, n) {
    var d = new Date(dateStr + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + n);
    return d.toISOString().slice(0, 10);
  }

  function weekdayZh(dateStr) {
    var WEEKDAY_ZH = ['日', '一', '二', '三', '四', '五', '六'];
    return WEEKDAY_ZH[new Date(dateStr + 'T00:00:00Z').getUTCDay()];
  }

  function segmentText(s) {
    return (s.in || '？') + '–' + (s.out || '？') + (s.cross ? '(+1)' : '');
  }

  function badgeClass(statusText) {
    if (!statusText || statusText === '正常') return 'normal';
    return 'warn';
  }

  function buildPeriodRow(period) {
    var row = document.createElement('div');
    row.className = 'period-row';
    var start = document.createElement('input');
    start.type = 'time';
    start.className = 'p-start';
    start.value = (period && period.start) || '';
    var dash = document.createElement('span');
    dash.className = 'dash';
    dash.textContent = '–';
    var end = document.createElement('input');
    end.type = 'time';
    end.className = 'p-end';
    end.value = (period && period.end) || '';
    var removeBtn = document.createElement('button');
    removeBtn.type = 'button';
    removeBtn.className = 'remove-btn';
    removeBtn.textContent = '－';
    removeBtn.addEventListener('click', function () { row.remove(); });
    row.appendChild(start);
    row.appendChild(dash);
    row.appendChild(end);
    row.appendChild(removeBtn);
    return row;
  }

  // 假別＋時數的顯示後綴，如「・病假2.5h」「・病假」；沒假別回空字串
  function leaveSuffix(type, hours) {
    if (!type) return '';
    var h = (hours === 0 || hours) && hours !== '' ? Number(hours) : null;
    return '・' + type + (h != null && isFinite(h) ? h + 'h' : '');
  }

  function renderResult(resultBox, res) {
    resultBox.className = 'result-box show ' + (badgeClass(res.status_text) === 'normal' ? 'result-ok' : 'result-warn');
    resultBox.textContent = '✓ 已核定 ' + res.approved_hours + ' 小時・' + res.status_text
      + leaveSuffix(res.leave_type, res.leave_hours) + '（' + res.manager_name + '）';
  }

  function buildEmployeeCard(emp) {
    var card = document.createElement('div');
    card.className = 'card';

    var nameEl = document.createElement('div');
    nameEl.className = 'emp-name';
    nameEl.textContent = emp.name;
    card.appendChild(nameEl);

    var punchEl = document.createElement('div');
    punchEl.className = 'punch-summary';
    if (emp.segments && emp.segments.length) {
      punchEl.textContent = '打卡：' + emp.segments.map(segmentText).join('、')
        + '　參考 ' + emp.reference + ' 小時';
    } else {
      // 沒打卡的同仁也列出（整天忘刷卡的人才核得到）；參考空白不顯示數字
      punchEl.textContent = '今天沒有打卡紀錄';
    }
    card.appendChild(punchEl);

    if (emp.approved) {
      var badge = document.createElement('div');
      badge.className = 'approved-badge ' + badgeClass(emp.approved.status_text);
      badge.textContent = '已核定 ' + emp.approved.approved_hours + ' 小時・' + emp.approved.status_text
        + leaveSuffix(emp.leave_type, emp.leave_hours) + '（' + emp.approved.manager_name + '）';
      card.appendChild(badge);
    } else {
      var pending = document.createElement('div');
      pending.className = 'approved-badge pending';
      pending.textContent = '待核定';
      card.appendChild(pending);
    }

    var periodRows = document.createElement('div');
    periodRows.className = 'period-rows';
    var initialPeriods = (emp.approved && emp.approved.periods && emp.approved.periods.length)
      ? emp.approved.periods
      : [null];
    initialPeriods.forEach(function (p) { periodRows.appendChild(buildPeriodRow(p)); });
    card.appendChild(periodRows);

    // 請假註記：選了假別會寫入 leave 分頁（月表狀態欄顯示），改回「無」重送會清掉
    var LEAVE_TYPES = ['病假', '事假', '特休假', '生理假', '家庭照顧假', '喪假', '婚假'];
    var leaveRow = document.createElement('div');
    leaveRow.className = 'leave-row';
    var leaveLabel = document.createElement('label');
    leaveLabel.textContent = '請假註記';
    var leaveSelect = document.createElement('select');
    ['無'].concat(LEAVE_TYPES).forEach(function (t) {
      var opt = document.createElement('option');
      opt.value = t === '無' ? '' : t;
      opt.textContent = t;
      leaveSelect.appendChild(opt);
    });
    leaveSelect.value = emp.leave_type || '';
    // 時數：只在有選假別時可填（選「無」時鎖住並清空），單位小時、以 0.25（15 分鐘）為刻度
    var leaveHours = document.createElement('input');
    leaveHours.type = 'number';
    leaveHours.className = 'leave-hours';
    leaveHours.step = '0.25';
    leaveHours.min = '0';
    leaveHours.placeholder = '時數';
    leaveHours.value = (emp.leave_hours === 0 || emp.leave_hours) ? emp.leave_hours : '';
    var hoursUnit = document.createElement('span');
    hoursUnit.className = 'hours-unit';
    hoursUnit.textContent = '小時';
    function syncLeaveHoursEnabled() {
      var on = !!leaveSelect.value;
      leaveHours.disabled = !on;
      if (!on) leaveHours.value = '';
    }
    leaveSelect.addEventListener('change', syncLeaveHoursEnabled);
    syncLeaveHoursEnabled();
    leaveRow.appendChild(leaveLabel);
    leaveRow.appendChild(leaveSelect);
    leaveRow.appendChild(leaveHours);
    leaveRow.appendChild(hoursUnit);
    card.appendChild(leaveRow);

    var actions = document.createElement('div');
    actions.className = 'card-actions';
    var addBtn = document.createElement('button');
    addBtn.type = 'button';
    addBtn.className = 'add-period-btn';
    addBtn.textContent = '＋ 加一段';
    addBtn.addEventListener('click', function () { periodRows.appendChild(buildPeriodRow(null)); });
    var submitBtn = document.createElement('button');
    submitBtn.type = 'button';
    submitBtn.className = 'submit-btn';
    submitBtn.textContent = emp.approved ? '重新送出核定' : '送出核定';
    actions.appendChild(addBtn);
    actions.appendChild(submitBtn);
    card.appendChild(actions);

    var resultBox = document.createElement('div');
    resultBox.className = 'result-box';
    card.appendChild(resultBox);

    submitBtn.addEventListener('click', function () {
      var periods = [];
      var halfFilled = false;
      periodRows.querySelectorAll('.period-row').forEach(function (row) {
        var s = row.querySelector('.p-start').value;
        var e = row.querySelector('.p-end').value;
        if (s && e) periods.push({ start: s, end: e });
        else if (s || e) halfFilled = true; // 只填了上班或下班一邊
      });
      if (halfFilled) {
        resultBox.className = 'result-box show result-error';
        resultBox.textContent = '✕ 有一段只填了上班或下班時間，請補齊兩邊，或按該段的 － 移除。';
        return;
      }
      if (periods.length === 0) {
        // 沒填任何上班時段：有選假別＝整天請假（核定 0 小時）；否則就是漏填
        if (!leaveSelect.value) {
          resultBox.className = 'result-box show result-error';
          resultBox.textContent = '✕ 請至少輸入一段上班時間；若是整天請假，請在「請假註記」選假別再送出。';
          return;
        }
        var lmsg = '整天請假：' + emp.name + '\n' + leaveSelect.value
          + (leaveHours.value ? '　' + leaveHours.value + ' 小時' : '')
          + '\n核定時數 0 小時（整天沒上班）\n\n確定送出?';
        if (!window.confirm(lmsg)) return;
      } else {
        // 送出前防呆：算總時數（跨夜比照後端 end<=start 視為隔天）、揪出打反與時段重疊，
        // 用確認框把「核定總時數＋提醒」攤給主管看過再寫入（覆蓋前先確認、把打錯攔在寫入前）。
        var hm2min = function (t) { var a = t.split(':'); return (+a[0]) * 60 + (+a[1]); };
        var segs = periods.map(function (p) {
          var sm = hm2min(p.start), em = hm2min(p.end), overnight = em <= sm;
          if (overnight) em += 1440;
          return { start: p.start, end: p.end, sm: sm, em: em, overnight: overnight };
        });
        var totalH = Math.round(segs.reduce(function (a, s) { return a + (s.em - s.sm) / 60; }, 0) * 100) / 100;

        var warnings = [];
        segs.forEach(function (s) {
          if (s.overnight) warnings.push('・' + s.start + '–' + s.end + ' 會算成跨夜到隔天（' + (Math.round((s.em - s.sm) / 60 * 100) / 100) + ' 小時），若是打錯請改回。');
        });
        var sorted = segs.slice().sort(function (a, b) { return a.sm - b.sm; });
        for (var i = 1; i < sorted.length; i++) {
          if (sorted[i].sm < sorted[i - 1].em) {
            warnings.push('・' + sorted[i - 1].start + '–' + sorted[i - 1].end + ' 與 ' + sorted[i].start + '–' + sorted[i].end + ' 時段重疊，會重複計算。');
          }
        }

        var msg = '即將核定 ' + emp.name + '：\n' + segs.map(function (s) { return s.start + '–' + s.end; }).join('、')
          + '\n核定時數共 ' + totalH + ' 小時';
        if (leaveSelect.value) msg += '\n請假：' + leaveSelect.value + (leaveHours.value ? ' ' + leaveHours.value + ' 小時' : '');
        if (warnings.length) msg += '\n\n⚠ 請再確認：\n' + warnings.join('\n');
        msg += '\n\n確定送出?';
        if (!window.confirm(msg)) return;
      }
      submitBtn.disabled = true;
      submitBtn.textContent = '送出中…';
      apiPost({
        action: 'mgr_approve',
        mgr_key: mgrKey,
        date: currentDate,
        emp_id: emp.emp_id,
        periods: periods,
        leave_type: leaveSelect.value,
        leave_hours: leaveSelect.value ? leaveHours.value : '',
      }).then(function (res) {
        submitBtn.disabled = false;
        submitBtn.textContent = '重新送出核定';
        if (!res.ok) {
          resultBox.className = 'result-box show result-error';
          resultBox.textContent = '✕ 核定失敗：' + (res.error || '未知錯誤');
          return;
        }
        delete dayCache[currentDate]; // 核定改了這天的資料 → 清快取，下次切回會抓新的
        renderResult(resultBox, res);
      }).catch(function () {
        submitBtn.disabled = false;
        submitBtn.textContent = '重新送出核定';
        resultBox.className = 'result-box show result-error';
        resultBox.textContent = '✕ 連線失敗，請檢查網路後再試。';
      });
    });

    return card;
  }

  function renderEmployees(employees) {
    empListEl.innerHTML = '';
    if (!employees || employees.length === 0) {
      var empty = document.createElement('div');
      empty.className = 'card center-msg';
      empty.textContent = '這天沒有任何同仁打卡紀錄。';
      empListEl.appendChild(empty);
      return;
    }
    employees.forEach(function (emp) { empListEl.appendChild(buildEmployeeCard(emp)); });
  }

  // 日期資料快取：Apps Script 每次請求都要讀 5 張表、有固定延遲，切換日期若每次重打會慢。
  // 只快取「今天之前」的日期（過去資料不會變——除了主管當下核定，核定成功會清掉該日快取）；
  // 今天/未來一律即時抓（會有新打卡）。載入某天時背景預抓前後一天，讓 ‹ › 幾乎瞬間。
  var dayCache = {};      // 'yyyy-mm-dd' -> employees 陣列
  var prefetching = {};   // 進行中的背景預抓，避免同一天重複打

  function pad2(n) { return (n < 10 ? '0' : '') + n; }
  function deviceTodayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
  }
  function cacheable(dateStr) { return !!dateStr && dateStr < deviceTodayStr(); } // 嚴格早於今天才快取

  // 背景預抓中心日往前 N 天（近一週），讓手機翻閱近日幾乎都命中快取、不用等後端 ~2 秒。
  // Apps Script 每請求固定 ~2 秒，所以循序一次抓一天（近的先），避免手機同時開一堆連線互相拖慢。
  var PREFETCH_PAST_DAYS = 6;

  function prefetchNeighbors(dateStr) {
    var targets = [];
    for (var i = 1; i <= PREFETCH_PAST_DAYS; i++) targets.push(addDaysStr(dateStr, -i)); // 往前近→遠
    targets.push(addDaysStr(dateStr, 1)); // 往後一天（多半是今天/未來，會被 cacheable 擋掉）
    (function next() {
      var d = null;
      while (targets.length) {
        var cand = targets.shift();
        if (cacheable(cand) && !dayCache[cand] && !prefetching[cand]) { d = cand; break; }
      }
      if (!d) return;
      prefetching[d] = true;
      apiPost({ action: 'mgr_day', mgr_key: mgrKey, date: d }).then(function (res) {
        delete prefetching[d];
        if (res && res.ok) dayCache[res.date] = res.employees;
        next();
      }).catch(function () { delete prefetching[d]; next(); });
    })();
  }

  function renderDay(dateStr, employees) {
    loadingCard.style.display = 'none';
    errorCard.style.display = 'none';
    currentDate = dateStr;
    dateInput.value = dateStr;
    renderEmployees(employees);
  }

  function loadDay(dateOverride) {
    // 命中快取（過去看過或已預抓的日期）→ 直接畫，不轉圈、不打後端
    if (dateOverride && dayCache[dateOverride]) {
      renderDay(dateOverride, dayCache[dateOverride]);
      prefetchNeighbors(dateOverride);
      return;
    }
    loadingCard.style.display = 'block';
    errorCard.style.display = 'none';
    empListEl.innerHTML = '';
    var payload = { action: 'mgr_day', mgr_key: mgrKey };
    if (dateOverride) payload.date = dateOverride;
    apiPost(payload).then(function (res) {
      if (!res.ok) {
        showError(res.error === 'unauthorized' ? '主管金鑰錯誤，請確認網址是否正確。' : ('讀取失敗：' + res.error));
        return;
      }
      if (cacheable(res.date)) dayCache[res.date] = res.employees;
      renderDay(res.date, res.employees);
      prefetchNeighbors(res.date);
    }).catch(function () {
      loadingCard.style.display = 'none';
      showError('連線失敗，請檢查網路連線後重新整理頁面。');
    });
  }

  dateInput.addEventListener('change', function () {
    if (dateInput.value) loadDay(dateInput.value);
  });
  btnPrevDay.addEventListener('click', function () {
    if (currentDate) loadDay(addDaysStr(currentDate, -1));
  });
  btnNextDay.addEventListener('click', function () {
    if (currentDate) loadDay(addDaysStr(currentDate, 1));
  });
  btnToday.addEventListener('click', function () { loadDay(null); });

  function init() {
    if (!mgrKey) {
      loadingCard.style.display = 'none';
      showError('連結錯誤：找不到主管代碼，請確認網址是否完整。');
      return;
    }
    if (API_URL.indexOf('PASTE_') === 0) {
      loadingCard.style.display = 'none';
      showError('系統尚未設定完成，請聯絡老闆。');
      return;
    }
    loadDay(null);
  }

  init();
})();
</script>
</body>
</html>
