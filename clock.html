<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>麻的小辛辣 員工打卡</title>
<link rel="apple-touch-icon" href="assets/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<meta name="apple-mobile-web-app-title" content="打卡">
<style>
  :root {
    --brand-red: #E8380D;
    --brand-pink: #EF856D;
    --brand-black: #231815;
    --brand-orange: #F08300;
    --brand-gold: #FABE00;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: radial-gradient(120% 90% at 50% 16%, #c9290b 0%, #a81f08 55%, #8a1906 100%) fixed;
    color: #fff;
    min-height: 100vh;
  }
  /* 背景真實火焰影片（黑底以 screen 混合去除）＋暖色暈影——與績效系統同一套 */
  .fireVid {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center; z-index: 0; pointer-events: none;
    mix-blend-mode: screen; filter: brightness(1.05) saturate(1.05) contrast(1.05);
    opacity: 0.55;
  }
  .scrim {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(85% 74% at 50% 44%, rgba(42,11,3,0) 0%, rgba(34,9,3,.14) 60%, rgba(20,5,1,.4) 100%);
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 28px 20px 40px;
    position: relative;
    z-index: 1;
  }
  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header h1 {
    font-size: 26px;
    font-weight: 900;
    margin: 0 0 4px;
    letter-spacing: 2px;
  }
  header p {
    margin: 0;
    opacity: 0.85;
    font-size: 14px;
  }
  .card {
    background: #fff;
    color: var(--brand-black);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
  }
  .name-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .name-row .name {
    font-size: 22px;
    font-weight: 700;
  }
  .device-hint {
    font-size: 12px;
    color: #8a6a5f;
    margin-bottom: 10px;
    min-height: 16px;
  }
  .today-list {
    list-style: none;
    margin: 0;
    padding: 0;
    font-size: 14px;
  }
  .today-list li {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #f0e6e2;
  }
  .today-list li:last-child { border-bottom: none; }
  .no-events {
    font-size: 14px;
    color: #8a6a5f;
  }
  /* 次要按鈕：回查最近 40 天（沿用卡片內既有的字色與分隔線色，不加新色彩） */
  .recent-toggle {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 10px;
    font-size: 14px;
    color: #8a6a5f;
    background: none;
    border: 1px solid #f0e6e2;
    border-radius: 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .recent-toggle:disabled { opacity: 0.5; }
  .recent-list li {
    gap: 8px;
  }
  .recent-list .day-info { flex: 1; }
  .recent-list .day-hours { white-space: nowrap; }
  .btn-group {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-top: auto;
  }
  .btn {
    font-size: 22px;
    font-weight: 900;
    padding: 26px;
    border-radius: 16px;
    border: none;
    color: #fff;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:disabled { opacity: 0.5; }
  .btn-in { background: var(--brand-orange); }
  .btn-out { background: var(--brand-black); }
  .btn.not-allowed {
    filter: grayscale(1);
    opacity: 0.45;
  }
  .status-box {
    margin-top: 16px;
    padding: 16px;
    border-radius: 12px;
    font-size: 15px;
    line-height: 1.6;
    display: none;
  }
  .status-box.show { display: block; }
  .status-ok { background: #e6f7ec; color: #1a7a3d; }
  .status-warn { background: #fff6e0; color: #8a6100; }
  .status-error { background: #fdeceb; color: #c22a12; }
  .status-loading { background: rgba(255, 255, 255, 0.9); color: var(--brand-black); }
  .center-msg { text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<video class="fireVid" src="assets/fire.mp4" autoplay muted loop playsinline aria-hidden="true"></video>
<div class="scrim" aria-hidden="true"></div>
<div class="container">
  <header>
    <h1>麻的🔥小辛辣</h1>
    <p>員工打卡</p>
  </header>

  <div id="loadingCard" class="card center-msg">載入中…</div>

  <div id="mainCard" class="card" style="display:none;">
    <div class="name-row">
      <span class="name" id="empName">—</span>
    </div>
    <div class="device-hint" id="deviceHint"></div>
    <ul class="today-list" id="todayList"></ul>
    <div class="no-events" id="noEvents" style="display:none;">今天還沒有打卡紀錄</div>
    <div class="no-events" id="todayHours"></div>
    <button class="recent-toggle" id="btnRecent" type="button">查看最近 40 天</button>
    <ul class="today-list recent-list" id="recentList" style="display:none;"></ul>
  </div>

  <div id="errorCard" class="card center-msg" style="display:none; color:#c22a12;"></div>

  <div class="btn-group" id="btnGroup" style="display:none;">
    <button class="btn btn-in" id="btnIn" type="button">上班打卡</button>
    <button class="btn btn-out" id="btnOut" type="button">下班打卡</button>
  </div>

  <div class="status-box" id="statusBox"></div>
</div>

<script>
(function () {
  'use strict';

  var API_URL = 'https://script.google.com/macros/s/AKfycbxE4DTz847y0bPvLd4mD_9vBFTe3npmVVYKU1CYgeFcUpAuL4vLIA3rySXSR-2qujdJ0A/exec';

  function qs(name) {
    var params = new URLSearchParams(window.location.search);
    return params.get(name);
  }

  var isLocalHost = ['localhost', '127.0.0.1'].indexOf(window.location.hostname) !== -1;
  if (isLocalHost) {
    var apiOverride = qs('api');
    if (apiOverride) API_URL = apiOverride;
  }

  var key = qs('k');

  var DEVICE_KEY = 'mala_clock_device';
  function fallbackUuid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
      var r = (Math.random() * 16) | 0;
      var v = c === 'x' ? r : (r & 0x3) | 0x8;
      return v.toString(16);
    });
  }
  function getDeviceId() {
    var id = localStorage.getItem(DEVICE_KEY);
    if (!id) {
      id = (window.crypto && window.crypto.randomUUID) ? window.crypto.randomUUID() : fallbackUuid();
      localStorage.setItem(DEVICE_KEY, id);
    }
    return id;
  }
  var deviceId = getDeviceId();

  var loadingCard = document.getElementById('loadingCard');
  var mainCard = document.getElementById('mainCard');
  var errorCard = document.getElementById('errorCard');
  var btnGroup = document.getElementById('btnGroup');
  var empNameEl = document.getElementById('empName');
  var deviceHintEl = document.getElementById('deviceHint');
  var todayListEl = document.getElementById('todayList');
  var noEventsEl = document.getElementById('noEvents');
  var todayHoursEl = document.getElementById('todayHours');
  var statusBox = document.getElementById('statusBox');
  var btnIn = document.getElementById('btnIn');
  var btnOut = document.getElementById('btnOut');
  var btnRecent = document.getElementById('btnRecent');
  var recentListEl = document.getElementById('recentList');

  function showError(msg) {
    loadingCard.style.display = 'none';
    mainCard.style.display = 'none';
    btnGroup.style.display = 'none';
    errorCard.style.display = 'block';
    errorCard.textContent = msg;
  }

  function typeLabel(t) { return t === 'in' ? '上班' : '下班'; }
  function statusLabel(s) {
    if (s === 'ok') return '正常';
    if (s === 'pending_device_approval') return '待核准';
    if (s === 'rejected_out_of_range') return '超出範圍';
    if (s === 'rejected_device') return '裝置被拒';
    if (s === 'rejected_duplicate') return '重複打卡';
    return s;
  }

  // 目前不允許的打卡型別（'in'/'out'/null）。由伺服器 whoami 的 last_counted
  // （12 小時回看視窗，跨日也算）決定，不要自己從 today_events 算。
  var blockedType = null;

  function duplicateMessage(lastType) {
    return lastType === 'in'
      ? '⚠ 已打過上班卡，下一筆請打下班卡'
      : '⚠ 已打過下班卡，下一筆請打上班卡';
  }

  function updateButtonStates(lastCounted) {
    blockedType = lastCounted ? lastCounted.type : null;
    btnIn.classList.toggle('not-allowed', blockedType === 'in');
    btnOut.classList.toggle('not-allowed', blockedType === 'out');
  }

  function renderTodayEvents(events) {
    todayListEl.innerHTML = '';
    if (!events || events.length === 0) {
      noEventsEl.style.display = 'block';
      return;
    }
    noEventsEl.style.display = 'none';
    events.forEach(function (e) {
      var li = document.createElement('li');
      var time = (e.ts || '').substring(11, 16);
      var left = document.createElement('span');
      left.textContent = typeLabel(e.type) + ' ' + time;
      var right = document.createElement('span');
      right.textContent = statusLabel(e.status);
      li.appendChild(left);
      li.appendChild(right);
      todayListEl.appendChild(li);
    });
  }

  // 今日時數摘要（whoami 的 today_hours：{reference, approved, working_since}）。
  // 有 working_since→仍在上班中，只列已完成時段的時數；無→今日已無進行中的班段。
  // 只顯示核定，不顯示參考（Eason 2026-07-13 指定；後端仍回 reference，月表照舊兩欄並列）。
  function renderTodayHours(h) {
    if (!h) { todayHoursEl.textContent = ''; return; }
    if (h.working_since) {
      todayHoursEl.textContent = '上班中（' + h.working_since + ' 起）・已完成時段核定 ' + h.approved + ' 小時';
    } else {
      todayHoursEl.textContent = '今日核定時數：' + h.approved + ' 小時';
    }
  }

  function apiPost(payload) {
    return fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    }).then(function (res) { return res.json(); });
  }

  // ---- 最近 40 天回查（my_recent）：點按鈕才 fetch，可展開/收合 ----
  var WEEKDAY_ZH = ['日', '一', '二', '三', '四', '五', '六'];
  var recentOpen = false;
  var recentLoaded = false; // 打卡成功後設回 false，下次展開重新抓

  function weekdayZh(dateStr) {
    return WEEKDAY_ZH[new Date(dateStr + 'T00:00:00Z').getUTCDay()];
  }

  // 班段文字照月表慣例：跨夜段加 (+1)、缺的一端顯示「？」（如 17:05–？）
  function segmentText(s) {
    return (s.in || '？') + '–' + (s.out || '？') + (s.cross ? '(+1)' : '');
  }

  function renderRecentDays(days) {
    recentListEl.innerHTML = '';
    if (!days || days.length === 0) {
      var empty = document.createElement('li');
      empty.textContent = '最近 40 天沒有打卡紀錄';
      recentListEl.appendChild(empty);
      return;
    }
    days.forEach(function (d) {
      var li = document.createElement('li');
      var info = document.createElement('span');
      info.className = 'day-info';
      var md = parseInt(d.date.slice(5, 7), 10) + '/' + parseInt(d.date.slice(8, 10), 10);
      var segs = d.segments.map(segmentText).join('、');
      info.textContent = md + '（' + weekdayZh(d.date) + '）　' + segs
        + (d.notes && d.notes.length ? '　' + d.notes.join('、') : '');
      var hours = document.createElement('span');
      hours.className = 'day-hours';
      // 只顯示核定；忘刷卡當天不顯示時數（照月表「空白待人工判定」慣例，Eason 2026-07-13 指定）
      hours.textContent = (d.notes && d.notes.length) ? '' : '核定 ' + d.approved;
      li.appendChild(info);
      li.appendChild(hours);
      recentListEl.appendChild(li);
    });
  }

  function setRecentClosed() {
    recentOpen = false;
    recentListEl.style.display = 'none';
    btnRecent.textContent = '查看最近 40 天';
  }

  btnRecent.addEventListener('click', function () {
    if (recentOpen) {
      setRecentClosed();
      return;
    }
    if (recentLoaded) {
      recentOpen = true;
      recentListEl.style.display = 'block';
      btnRecent.textContent = '收合';
      return;
    }
    btnRecent.disabled = true;
    btnRecent.textContent = '載入中…';
    apiPost({ action: 'my_recent', key: key, device_id: deviceId })
      .then(function (res) {
        btnRecent.disabled = false;
        if (!res.ok) {
          setRecentClosed();
          showStatus('status-error', '✕ 查詢失敗，請重新整理頁面後再試。');
          return;
        }
        recentLoaded = true;
        renderRecentDays(res.days);
        recentOpen = true;
        recentListEl.style.display = 'block';
        btnRecent.textContent = '收合';
      })
      .catch(function () {
        btnRecent.disabled = false;
        setRecentClosed();
        showStatus('status-error', '✕ 連線失敗，請檢查網路後再試。');
      });
  });

  function init() {
    if (!key) {
      showError('連結錯誤：找不到員工代碼，請確認打卡連結是否完整。');
      return;
    }
    if (API_URL.indexOf('PASTE_') === 0) {
      showError('系統尚未設定完成，請聯絡老闆。');
      return;
    }
    apiPost({ action: 'whoami', key: key, device_id: deviceId })
      .then(function (res) {
        if (!res.ok) {
          showError('找不到這個打卡連結對應的員工，請確認連結是否正確。');
          return;
        }
        loadingCard.style.display = 'none';
        mainCard.style.display = 'block';
        btnGroup.style.display = 'flex';
        empNameEl.textContent = res.name;
        if (res.device_state === 'unbound') {
          deviceHintEl.textContent = '本裝置尚未綁定，首次打卡將自動綁定。';
        } else if (res.device_state === 'mismatch') {
          deviceHintEl.textContent = '這不是你平常綁定的裝置，打卡將送出待核准。';
        } else {
          deviceHintEl.textContent = '';
        }
        renderTodayEvents(res.today_events);
        renderTodayHours(res.today_hours);
        updateButtonStates(res.last_counted);
      })
      .catch(function () {
        showError('連線失敗，請檢查網路連線後重新整理頁面。');
      });
  }

  function setBusy(busy) {
    btnIn.disabled = busy;
    btnOut.disabled = busy;
  }

  function showStatus(cls, text) {
    statusBox.className = 'status-box show ' + cls;
    statusBox.textContent = text;
  }

  // 本機測試限定：?loc=store 模擬人在店內、?loc=away 模擬人在外地，正式環境不生效
  var FAKE_LOCATIONS = {
    store: { latitude: 24.7840945, longitude: 121.0157448 }, // 2026-07-13 校正座標，與後端 CONFIG 對齊
    away: { latitude: 25.0330, longitude: 121.5654 },
  };

  function getPosition() {
    if (isLocalHost && FAKE_LOCATIONS[qs('loc')]) {
      return Promise.resolve({ coords: FAKE_LOCATIONS[qs('loc')] });
    }
    return new Promise(function (resolve, reject) {
      if (!navigator.geolocation) {
        reject(new Error('此裝置不支援定位功能，無法打卡。'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        function (pos) { resolve(pos); },
        function (err) {
          if (err.code === err.PERMISSION_DENIED) {
            reject(new Error('定位權限被拒絕，請到手機設定開啟此頁面的定位權限後再試一次。'));
          } else if (err.code === err.TIMEOUT) {
            reject(new Error('定位逾時，請確認 GPS 訊號後重試。'));
          } else {
            reject(new Error('定位失敗，請重試。'));
          }
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    });
  }

  function doClock(type) {
    if (blockedType === type) {
      // 不打 API，直接提醒（按鈕仍可點，僅灰階視覺）
      showStatus('status-warn', duplicateMessage(blockedType));
      return;
    }
    setBusy(true);
    showStatus('status-loading', '定位中…');
    getPosition()
      .then(function (pos) {
        showStatus('status-loading', '送出打卡中…');
        return apiPost({
          action: 'clock',
          key: key,
          type: type,
          lat: pos.coords.latitude,
          lng: pos.coords.longitude,
          device_id: deviceId,
        });
      })
      .then(function (res) {
        if (!res.ok) {
          showStatus('status-error', '✕ 打卡失敗：找不到員工資料，請確認連結是否正確。');
          return;
        }
        if (res.status === 'ok') {
          showStatus('status-ok', '✓ 打卡成功　' + (res.ts || '').substring(11, 16));
        } else if (res.status === 'rejected_out_of_range') {
          showStatus('status-error', '✕ 距離門市 ' + Math.round(res.distance_m) + ' 公尺，超出範圍，請到店內再打卡。');
        } else if (res.status === 'pending_device_approval') {
          showStatus('status-warn', '⚠ 新裝置，需老闆核准後生效。');
        } else if (res.status === 'rejected_duplicate') {
          // 安全網：舊頁面/多分頁競態下由伺服器擋下
          showStatus('status-warn', duplicateMessage(res.last_type));
        } else {
          showStatus('status-warn', String(res.status));
        }
        apiPost({ action: 'whoami', key: key, device_id: deviceId }).then(function (r) {
          if (r.ok) {
            renderTodayEvents(r.today_events);
            renderTodayHours(r.today_hours);
            updateButtonStates(r.last_counted);
          }
        });
        // 剛打了卡，快取的最近 40 天已過期：展開中就立刻重抓，收合中則下次展開再抓
        recentLoaded = false;
        if (recentOpen) {
          apiPost({ action: 'my_recent', key: key, device_id: deviceId }).then(function (r2) {
            if (r2.ok) {
              recentLoaded = true;
              renderRecentDays(r2.days);
            }
          });
        }
      })
      .catch(function (err) {
        showStatus('status-error', '✕ ' + err.message);
      })
      .then(function () { setBusy(false); }, function () { setBusy(false); });
  }

  btnIn.addEventListener('click', function () { doClock('in'); });
  btnOut.addEventListener('click', function () { doClock('out'); });

  // 背景火焰影片（純視覺，不影響打卡）：
  // 系統設「減少動態」→ 暫停；否則若 autoplay 被瀏覽器政策擋下，主動嘗試播放，
  // 再不行就等第一次觸碰畫面（使用者手勢）補播——涵蓋 LINE 內建瀏覽器等嚴格環境。
  (function () {
    var fv = document.querySelector('.fireVid');
    if (!fv) return;
    if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      fv.pause(); fv.removeAttribute('autoplay');
      return;
    }
    var tryPlay = function () { var p = fv.play(); if (p && p.catch) p.catch(function () {}); };
    tryPlay();
    document.addEventListener('touchstart', tryPlay, { once: true });
    document.addEventListener('click', tryPlay, { once: true });
  })();

  init();
})();
</script>
</body>
</html>
